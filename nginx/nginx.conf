upstream django_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20M;

    location /api/ {
        # $http_host — как у клиента (часто IP:порт); иначе $host без порта ломает ALLOWED_HOSTS
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://django_backend;
    }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://django_backend;
    }

    location /media/ {
        alias /media/;
    }

    # Django: /static/admin/, /static/rest_framework/ → корень volume.
    # CRA build: /static/js/… → каталог static/ на volume.
    location ^~ /static/admin/ {
        alias /static_collected/admin/;
    }

    location ^~ /static/rest_framework/ {
        alias /static_collected/rest_framework/;
    }

    location /static/ {
        alias /static_collected/static/;
    }

    location / {
        root /static_collected;
        try_files $uri $uri/ /index.html;
    }
}
