name: Kittygram CI/CD

on:
  push:
    branches:
      - main

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    environment: project_env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Flake8 (backend)
        run: flake8 backend/

      - name: Pytest (infra)
        env:
          USE_SQLITE: 'true'
        run: pytest tests/test_files.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: |
          npm ci
          CI=true npm test -- --watchAll=false --passWithNoTests

  build_and_push_dockerhub:
    name: Build and Push Docker Images to Dockerhub
    runs-on: ubuntu-latest
    needs: tests
    environment: project_env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kittygram_gateway:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build_and_push_dockerhub
    environment: project_env
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/kittygram
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --remove-orphans

  auto_test:
    name: auto_test
    runs-on: ubuntu-latest
    needs: deploy
    environment: project_env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for deploy to settle
        run: sleep 45

      - name: Prepare tests.yml (KITTYGRAM_DOMAIN from secrets)
        run: |
          echo "repo_owner: ${{ github.repository_owner }}" > tests.yml
          echo "kittygram_domain: ${{ secrets.KITTYGRAM_DOMAIN }}" >> tests.yml
          echo "dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}" >> tests.yml
          cat tests.yml

      - name: Pytest (connection + Docker Hub)
        env:
          USE_SQLITE: 'true'
        run: pytest tests/test_connection.py tests/test_dockerhub_images.py

  telegram_notify:
    name: telegram-notify
    runs-on: ubuntu-latest
    needs: auto_test
    environment: project_env
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="Kittygram: пайплайн успешно завершён (tests → Docker Hub → deploy → auto_test) ✅"